# Application Name
spring.application.name=springboot-docker-demo

# Server Port
server.port=8080

# Actuator Endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.info.env.enabled=true

# Info for Actuator
info.app.name=Spring Boot Docker Demo
info.app.description=A sample Spring Boot application for Docker demonstration
info.app.version=1.0.0

# Logging
logging.level.root=INFO
logging.level.com.demo.docker=DEBUG
